baseURL = "https://alpenrosenfest.ch/"
languageCode = "de-CH"
defaultContentLanguage = "de"
copyright = "© Janick Lehmann"
title = "Alpenrosenfest Schneisingen"
theme = "alpenrosenfest-theme"
disableKinds = ["taxonomy", "term", "rss"]
enableRobotsTXT = true


# ═══════════════════════════════════════
# CACHE CONFIGURATION
# ═══════════════════════════════════════
[caches]
  [caches.images]
    dir = ':cacheDir/images'


# ═══════════════════════════════════════
# SITE PARAMETERS
# ═══════════════════════════════════════
[params]
  description = "Ein Kulturfest rund um die Alpenrosen in Schneisingen."
  date = 2026-06-07
  image = "images/alpenrosen-01.jpg"
  footerTagline = "Built with ❤️"


# ── Social Links ──
# Each entry: name (display label), icon (SVG icon key), url (link target)
# Available icons: instagram, facebook, tiktok, youtube, x, linkedin, email, website
[[params.social]]
  name = "Instagram"
  icon = "instagram"
  url = "https://instagram.com/alpenrosenfest"


# ── Colors ──
[params.colors]
  accent = "#D96A7A"
  secondary = "#5F7A4B"
  background = "#F0E3C5"


# ── Coming Soon Mode ──
# Set enabled = true to show a minimal "coming soon" page
# instead of the full event site (e.g. between events).
[params.comingSoon]
  enabled = false
  title = "Wir sind bald zurück"
  message = "Das Alpenrosenfest hat bereits stattgefunden. Die Internetseite wird wieder aktualisiert, wenn die Planung für das nächste Mal startet. Folge uns auf Social Media für Updates!"


# ── Notification Banner ──
# Set enabled = true to show a banner at the top of the site.
[params.banner]
  enabled = false
  message = "Wegen des schlechten Wetters findet das Alpenrosenfest in der Turnhalle Aemmert statt!"


# ── Navigation ──
# Each entry: label (display text), href (anchor link), cta (optional, highlight as button)
[[params.nav]]
  label = "Das Fest"
  href = "#ueber"
[[params.nav]]
  label = "Die Alpenrosen"
  href = "#pflanze"
[[params.nav]]
  label = "Programm"
  href = "#programm"
[[params.nav]]
  label = "Anfahrt"
  href = "#anfahrt"
[[params.nav]]
  label = "Unterstützer"
  href = "#sponsoren"
[[params.nav]]
  label = "OK"
  href = "#ok"


# ── Hero Section ──
[params.hero]
  title = "Alpenrosenfest"
  primaryButtonText = "Programm entdecken"
  primaryButtonHref = "#programm"
  secondaryButtonText = "Anfahrt & Ort"
  secondaryButtonHref = "#anfahrt"
  scrollHint = "Mehr erfahren"
  # Carousel interval in milliseconds (0 = no auto-advance)
  carouselInterval = 5000

# Hero carousel images (at least one required)
# src: path relative to /static, alt: accessibility text
[[params.hero.images]]
  src = "/images/alpenrosen-01.jpg"
  alt = "Blühende Alpenrose im Wald"
[[params.hero.images]]
  src = "/images/alpenrosen-02.jpg"
  alt = "Waldlichtung am Festplatz"
[[params.hero.images]]
  src = "/images/alpenrosen-03.jpg"
  alt = "Besucher beim Alpenrosenfest"

# ── About Section ──
[params.about]
  label = "Willkommen"
  title = "Das Fest"

[[params.about.cards]]
  icon = "flower"
  title = "Botanische Rarität"
  text = "Gefeiert wird das einzige wilde Vorkommen der Alpenrosen ausserhalb der Alpen. Das seit über 100 Jahren durchgeführte Fest ist eine Würdigung dieser botanischen Besonderheit."
[[params.about.cards]]
  icon = "house"
  title = "Fest im Wald"
  text = "Der besondere Standort der Pflanzen wird bei schönem Wetter zum Festplatz. Lässt das Wetter es nicht zu, findet das Fest in der Mehrzweckhalle statt."
[[params.about.cards]]
  icon = "sun"
  title = "Etwas für alle"
  text = "Das Programm bietet für alle etwas. Egal ob der Tag gemütlich im Wald verbracht wird oder die verschiedenen Attraktionen ausprobiert werden. Vorbeischauen lohnt sich auf jeden Fall!"

# ── Plant Section ──
[params.plant]
  label = "Die Pflanze"
  title = "Rostblaettrige Alpenrose"
  commonName = "Rhododendron ferrugineum"
  description = [
    "Die Rostblättrige Alpenrose ist ein immergrüner Zwergstrauch aus der Familie der Heidekrautgewächse. Ihren Namen verdankt sie den rostroten Drüsenschuppen auf der Blattunterseite von älteren Blättern. Sie wächst bevorzugt auf kalkarmen, sauren Böden",
    "Die Sage erzählt, dass die Samen der Alpenrosen einst aus den Rucksäcken zweier Geschwister fielen, die aus dem Kanton Glarus/Nidwalden vor den Franzosen flüchteten. Die wahrscheinlichste Erklärung für das Vorkommen ist jedoch, dass der Linth-Gletscher die Alpenrosen während der Eiszeit ins Studenland verfrachtet hat."
  ]

[[params.plant.facts]]
  value = "Mai - Juli"
  label = "Blühmonate"
[[params.plant.facts]]
  value = "20 - 100 cm"
  label = "Wuchshöhe"


# ── Highlights Section ──
[params.highlights]
  label = "Höhepunkte"
  title = "Was dich erwartet"

[[params.highlights.cards]]
  icon = "music"
  title = "Musikalisches Programm"
  text = "Musikalische Darbietungen von verschiedenen Gruppen sorgen für eine festliche Stimmung."
[[params.highlights.cards]]
  icon = "catering"
  title = "Festwirtschaft & Bar"
  text = "Die Festwirtschaft im Wald und eine gemütliche Bar laden zum Verweilen ein."
[[params.highlights.cards]]
  icon = "games"
  title = "Attraktionen & Unterhaltung"
  text = "Schiessbude, Kegelbahn, Glücksrad und Ponyreiten sorgen für ein kleines Vergnügen am Rande."


# ── schedule Section ──
[params.schedule]
  title = "Programm"
  subtitle = "Das Programm befindet sich noch in Planung und wird laufend aktualisiert. Bei schlechtem Wetter findet das Programm in der Turnhalle Aemmert statt. Der Entscheid wird ein paar Tage vor dem Fest auf der Internetseite und auf Social Media bekannt gegeben."

[[params.schedule.days]]
  tabLabel = "Samstag"
  id = "tag1"

  [[params.schedule.days.events]]
    time = "10:30"
    title = "Ökumenischer Gottesdienst"
    text = "Eröffnung des Alpenrosenfests mit einem ökumenischen Gottesdienst unter der Leitung von Bernhard Ollmert, musikalisch begleitet durch die Spielgemeinschaft Ehrendingen-Schneisingen."
    image = "images/schedule/Logos_Kirchen_kombiniert.png"
  [[params.schedule.days.events]]
    time = "11:15"
    title = "Öffnung Festwirtschaft und Attraktionen"
    text = "Betriebsbeginn der Festwirtschaft, Bar und der verschiedenen Attraktionen. Die Schiessbude, Kegelbahn und das Ponyreiten laden zum Mitmachen ein."
  [[params.schedule.days.events]]
    time = "ab 11:30"
    title = "Musikalische Unterhaltung"
    text = "Die Spielgemeinschaft Ehrendingen-Schneisingen, das Jugendensemble Schneisingen und die Bläserklasse Schneisingen bieten musikalische Unterhaltung."
  [[params.schedule.days.events]]
    time = "ab 12:30"
    title = "Grenzenlos Böhmische"
    text = "Grenzenlos Böhmische ist eine junge Blasmusikgruppe aus Vorarlberg, gegründet im Jahr 2021. Sie besteht aus sieben leidenschaftlichen Musikanten, die in kleiner Besetzung böhmisch-mährische Blasmusik spielen."
    image = "images/schedule/Logo Neu 2025 für Homepage oben.png"
    imageLink = "https://grenzenlos-boehmische.at/"
  [[params.schedule.days.events]]
    time = "18:00"
    title = "Abschluss"
    text = "Verabschiedung aller Gäste und Ausklang des Festes"


# ── Organizer Section ──
[params.organizer]
  label = "Der Gastgeber"
  title = "Organisationskomitee"
  image = "images/ok-alpenrosenfest.jpg"
  text = [
    "Hinter dem Alpenrosenfest steht ein engagiertes Organisationskomitee aus Schneisingen. Mit viel Herzblut und Freiwilligenarbeit sorgt das OK dafür, dass das traditionelle Fest jedes Mal zu einem unvergesslichen Erlebnis wird.",
    "Von der Planung des Programms über den Aufbau im Wald bis hin zur Festwirtschaft, das gesamte Team arbeitet Hand in Hand, um Besucherinnen und Besuchern einen wunderbaren Tag zu bereiten."
  ]


