baseURL = "https://alpenrosenfest.ch/"
languageCode = "de-CH"
defaultContentLanguage = "de"
copyright = "© Janick Lehmann"
title = "Alpenrosenfest Schneisingen"
theme = "alpenrosenfest-theme"
disableKinds = ["taxonomy", "term", "rss"]
enableRobotsTXT = true

[sitemap]
  changefreq = "weekly"
  priority = -1


# ═══════════════════════════════════════
# SITE PARAMETERS
# ═══════════════════════════════════════
[params]
  description = "Ein Kulturfest rund um die Alpenrosen in Schneisingen."
  date = 2026-06-07
  image = "images/alpenrosen-01.jpg"
  footerTagline = "Build with ❤️"


# ── Colors ──
[params.colors]
  accent = "#D96A7A"
  secondary = "#5F7A4B"
  background = "#F0E3C5"


# ── Notification Banner ──
# Set enabled = true to show a banner at the top of the site.
[params.banner]
  enabled = false
  message = ""


# ── Navigation ──
# Each entry: label (display text), href (anchor link), cta (optional, highlight as button)
[[params.nav]]
  label = "Das Fest"
  href = "#ueber"
[[params.nav]]
  label = "Die Alpenrosen"
  href = "#pflanze"
[[params.nav]]
  label = "Programm"
  href = "#programm"
[[params.nav]]
  label = "Anfahrt"
  href = "#anfahrt"
[[params.nav]]
  label = "Unterstützer"
  href = "#sponsoren"


# ── Hero Section ──
[params.hero]
  title = "Alpenrosenfest"
  primaryButtonText = "Programm entdecken"
  primaryButtonHref = "#programm"
  secondaryButtonText = "Anfahrt & Ort"
  secondaryButtonHref = "#anfahrt"
  scrollHint = "Mehr erfahren"
  # Carousel interval in milliseconds (0 = no auto-advance)
  carouselInterval = 5000

# Hero carousel images (at least one required)
# src: path relative to /static, alt: accessibility text
[[params.hero.images]]
  src = "/images/alpenrosen-01.jpg"
  alt = "Blühende Alpenrose im Wald"
[[params.hero.images]]
  src = "/images/alpenrosen-02.jpg"
  alt = "Waldlichtung am Festplatz"
[[params.hero.images]]
  src = "/images/alpenrosen-03.jpg"
  alt = "Besucher beim Alpenrosenfest"

# ── About Section ──
[params.about]
  label = "Willkommen"
  title = "Über das Fest"

[[params.about.cards]]
  icon = "flower"
  title = "Botanische Rarität"
  text = "Gefeiert wird das einzige wilde Vorkommen der Alpenrosen ausserhalb der Alpen. Das seit über 100 Jahren durchgeführte Fest ist eine Würdigung dieser botanischen Besonderheit."
[[params.about.cards]]
  icon = "house"
  title = "Fest im Wald"
  text = "Der besondere Standort der Pflanzen wird bei schönem Wetter zum Festplatz. Lässt das Wetter es nicht zu, findet das Fest in der Mehrzweckhalle statt."
[[params.about.cards]]
  icon = "sun"
  title = "Etwas für alle"
  text = "Das Programm bietet für alle etwas. Egal ob der Tag gemütlich im Wald verbracht wird oder die verschiedenen Attraktionen ausprobiert werden. Vorbeischauen lohnt sich auf jeden Fall!"

# ── Plant Section ──
[params.plant]
  label = "Die Pflanze"
  title = "Rostblaettrige Alpenrose"
  commonName = "Rhododendron ferrugineum"
  description = [
    "Die Rostblättrige Alpenrose ist ein immergrüner Strauch aus der Familie der Heidekrautgewächse. Ihren Namen verdankt sie den rostbraunen Drüsenschuppen auf der Blattunterseite.",
    "Normalerweise kommt sie in Höhenlagen zwischen 1.500 und 2.800 Metern in den Alpen vor. Umso bemerkenswerter ist es, dass sie an diesem Standort - weit ausserhalb ihres natürlichen Verbreitungsgebiets - als Eiszeitrelikt überlebt hat."
  ]

[[params.plant.facts]]
  value = "Mai - Juli"
  label = "Blühmonate"
[[params.plant.facts]]
  value = "20 - 100 cm"
  label = "Wuchshöhe"


# ── Highlights Section ──
[params.highlights]
  label = "Höhepunkte"
  title = "Was dich erwartet"

[[params.highlights.cards]]
  icon = "music"
  title = "Musikalisches Programm"
  text = "Musikalische Darbietungen von verschiedenen Gruppen sorgen für eine festliche Stimmung."
[[params.highlights.cards]]
  icon = "catering"
  title = "Festwirtschaft & Bar"
  text = "Die Festwirtschaft im Wald und eine gemütliche Bar laden zum Verweilen ein."
[[params.highlights.cards]]
  icon = "games"
  title = "Attraktionen & Unterhaltung"
  text = "Schiessbude, Kegelbahn und Glücksrad sorgen für ein kleines Vergnügen am Rande."


# ── schedule Section ──
[params.schedule]
  title = "Provisorisches Programm"
  subtitle = "Das Programm befindet sich noch in Planung und wird laufend aktualisiert."

[[params.schedule.days]]
  tabLabel = "Samstag"
  id = "tag1"

  [[params.schedule.days.events]]
    time = "10:30"
    title = "Ökumenischer Gottesdienst"
    text = "Eröffnung des Alpenrosenfests mit einem ökumenischen Gottesdienst, musikalisch begleitet durch die Spielgemeinschaft Ehrendingen-Schneisingen."
  [[params.schedule.days.events]]
    time = "11:30"
    title = "Öffnung Festwirtschaft und Attraktionen"
    text = "Betriebsbeginn der Festwirtschaft, Bar und der verschiedenen Attraktionen."
  [[params.schedule.days.events]]
    time = "12:00"
    title = "Grenzenlos Böhmische"
    text = "Grenzenlos Böhmische ist eine junge Blasmusikgruppe aus Vorarlberg, gegründet im Jahr 2021. Sie besteht aus sieben leidenschaftlichen Musikanten, die in kleiner Besetzung böhmisch-mährische Blasmusik spielen."
    image = "https://grenzenlos-boehmische.at/images/Logo%20Neu%202025%20fu%CC%88r%20Homepage%20oben.png"
    imageLink = "https://grenzenlos-boehmische.at/"
  [[params.schedule.days.events]]
    time = "noch offen"
    title = "Weitere Programmpunkte"
    text = "Wir arbeiten daran, das Programm mit zusammenzustellen und werden es laufend aktualisieren."
  [[params.schedule.days.events]]
    time = "17:00"
    title = "Abschluss"
    text = "Verabschiedung aller Gäste und Ausklang des Festes"


# ── Location Section ──
[params.location]
  label = "So findest du zu uns"
  title = "Anfahrt & Ort"
  mapPlaceholderTitle = "Kartenansicht folgt"
  mapPlaceholderText = "Genauer Standort wird bei der Anmeldung mitgeteilt"
  map = "//umap.osm.ch/de/map/alpenrosenfest_12573?scrollWheelZoom=false"
  # Edit link: https://umap.osm.ch/de/map/alpenrosenfest_12573

[[params.location.details]]
  icon = "pin"
  title = "Veranstaltungsort"
  text = "Im Schneisinger Bowald in der Waldlichtung bei den Alpenrosen."
  [[params.location.details]]
  icon = "parking"
  title = "Parkplätze"
  text = "In der Nähe des Festplatzes stehen Parkmöglichkeiten zur Verfügung. Die Feuerwehr Schneisingen weist die Fahrzeuge ein."
[[params.location.details]]
  icon = "directions"
  title = "Öffentlicher Verkehr"
  text = "PostAuto Linie 354 bis 'Schneisingen, Oberdorf', dann ca. 20 Minuten Fussweg zum Festplatz oder PostAuto Linie 354 bis 'Schneisingen, Mitteldorf', dann Shuttle vom Schulhaus zum Festplatz."
[[params.location.details]]
  icon = "shuttle"
  title = "Shuttle-Service"
  text = "Vom Schulhaus Aemmert wird ein Shuttle-Service angeboten. Der Shuttle verkehrt von 10:00 bis 16:30 Uhr."


# ── Sponsors Section ──
[params.sponsors]
  label = "Unsere Unterstützer"
  title = "Sponsoren"

