name: Enable Coming Soon Page

on:
  schedule:
    - cron: "0 2 * 5-6 *"
      timezone: "Europe/Zurich"
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  enable-coming-soon:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Read event date and check if coming soon should be enabled
        id: check
        run: |
          EVENT_DATE=$(grep -E '^\s*date\s*=' hugo.toml | head -1 | sed 's/.*=\s*//' | tr -d ' "'\''')
          echo "Event date: $EVENT_DATE"
          ENABLE_DATE=$(date -u -d "$EVENT_DATE + 1 day" +%s)
          TODAY=$(date -u +%s)
          echo "Enable date: $(date -u -d "@$ENABLE_DATE" +%Y-%m-%d)"
          echo "Today: $(date -u -d "@$TODAY" +%Y-%m-%d)"
          if [[ "$TODAY" -ge "$ENABLE_DATE" ]]; then
            echo "should_enable=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_enable=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Enable coming soon mode
        if: steps.check.outputs.should_enable == 'true'
        run: sed -i '/^\[params\.comingSoon\]$/,/^[[:space:]]*enabled/ s/enabled = false/enabled = true/' hugo.toml
      - name: Check for changes
        if: steps.check.outputs.should_enable == 'true'
        id: diff
        run: |
          if git diff --quiet hugo.toml; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add hugo.toml
          git commit -m "chore: enable coming soon page for off-season"
          git push
