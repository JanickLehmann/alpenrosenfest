name: Enable Coming Soon Page

on:
  schedule:
    - cron: "0 2 * 5-6 *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  enable-coming-soon:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Read event date and check if coming soon should be enabled
        id: check
        run: |
          # Extract the event date from hugo.toml
          EVENT_DATE=$(grep -E '^\s*date\s*=' hugo.toml | head -1 | sed 's/.*=\s*//' | tr -d ' "'\''')
          echo "Event date: $EVENT_DATE"

          # Calculate the day after the event
          ENABLE_DATE=$(date -u -d "$EVENT_DATE + 1 day" +%Y-%m-%d)
          TODAY=$(date -u +%Y-%m-%d)
          echo "Enable date: $ENABLE_DATE"
          echo "Today: $TODAY"

          if [[ "$TODAY" >= "$ENABLE_DATE" ]]; then
            echo "should_enable=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_enable=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Enable coming soon mode
        if: steps.check.outputs.should_enable == 'true'
        run: sed -i '/^\[params\.comingSoon\]$/,/^[[:space:]]*enabled/ s/enabled = false/enabled = true/' hugo.toml

      - name: Check for changes
        if: steps.check.outputs.should_enable == 'true'
        id: diff
        run: |
          if git diff --quiet hugo.toml; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add hugo.toml
          git commit -m "chore: enable coming soon page for off-season"
          git push
